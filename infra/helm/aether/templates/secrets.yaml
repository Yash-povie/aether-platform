# IMPORTANT: Replace all base64-encoded placeholder values before deploying to production.
# To encode a value: echo -n 'your-value' | base64
# Recommended: Use AWS Secrets Manager + external-secrets-operator instead of storing secrets here.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aether.fullname" . }}-secrets
  labels:
    {{- include "aether.labels" . | nindent 4 }}
  annotations:
    # Reminder: rotate these secrets regularly
    aether.io/secret-rotation: "required"
type: Opaque
data:
  # PostgreSQL connection string (asyncpg format)
  DB_URL: {{ .Values.secrets.DB_URL }}
  # RS256 JWT signing keys (PEM format, base64-encoded)
  JWT_PRIVATE_KEY: {{ .Values.secrets.JWT_PRIVATE_KEY }}
  JWT_PUBLIC_KEY: {{ .Values.secrets.JWT_PUBLIC_KEY }}
  # LLM provider API keys
  ANTHROPIC_API_KEY: {{ .Values.secrets.ANTHROPIC_API_KEY }}
  GROQ_API_KEY: {{ .Values.secrets.GROQ_API_KEY }}
  # Message broker
  RABBITMQ_URL: {{ .Values.secrets.RABBITMQ_URL }}
  # Object storage
  MINIO_ACCESS_KEY: {{ .Values.secrets.MINIO_ACCESS_KEY }}
  MINIO_SECRET_KEY: {{ .Values.secrets.MINIO_SECRET_KEY }}