apiVersion: v1
kind: Service
metadata:
  name: {{ include "aether.fullname" . }}-hitl-service
  labels:
    {{- include "aether.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "aether.fullname" . }}-hitl-service
  ports:
    - port: 80
      targetPort: 8001
      protocol: TCP
      name: http
  type: ClusterIP